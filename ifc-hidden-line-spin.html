<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Continuously rotating hidden-line IFC model for James Watts' BIM portfolio." />
  <title>Hidden-Line IFC Model | James Watts Portfolio</title>
  <script type="module" crossorigin src="./assets/ifc-viewer-app.js?v=hidden-line-spin-3"></script>
  <link rel="stylesheet" crossorigin href="./assets/ifc-viewer.css?v=hidden-line-spin-3" />
</head>
<body
  data-model-id="SFPUC-914-HIDDEN-LINE"
  data-fragments-src="./assets/models/SFPUC_914-IFC-hidden-line.frag"
  data-view-mode="hidden-line-spin"
>
  <main class="viewer-shell">
    <section class="viewer-stage" aria-label="Continuously rotating hidden-line 3D model">
      <div id="viewer-container" class="viewer-container"></div>

      <div id="viewer-loading" class="viewer-loading" role="status" aria-label="Loading model">
        <div class="loading-card">
          <img class="loading-face" src="./assets/james-portrait-smooth.png" alt="" aria-hidden="true" />
        </div>
      </div>

      <div id="viewer-error" class="viewer-error" role="alert" hidden>
        <strong>Model could not be loaded.</strong>
        <span id="viewer-error-message">Check that the model and viewer assets were uploaded.</span>
      </div>
    </section>
  </main>
</body>
</html>
